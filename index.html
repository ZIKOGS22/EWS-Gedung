<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EWS Kontroling Cabang 2027</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    .modal { transition: opacity 0.25s ease; }
    body.modal-active { overflow: hidden; }
  </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

  <nav class="bg-blue-900 text-white p-4 shadow-md flex justify-between items-center">
    <h1 class="text-xl font-bold tracking-wider">🏢 EWS DASHBOARD GEDUNG 2027</h1>
    <span class="text-sm bg-blue-800 px-3 py-1 rounded">Live Sync: Google Sheets</span>
  </nav>

  <div class="max-w-7xl mx-auto p-4 md:p-6 space-y-6">
    
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
        <div>
          <p class="text-gray-500 text-sm font-medium">Total Ajuan Cabang</p>
          <h3 id="statTotal" class="text-3xl font-bold mt-1">0</h3>
        </div>
        <div class="p-3 bg-blue-50 text-blue-600 rounded-lg">📊</div>
      </div>
      <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
        <div>
          <p class="text-gray-500 text-sm font-medium">Belum Pengajuan (Tahap 00)</p>
          <h3 id="statBelum" class="text-3xl font-bold text-amber-600 mt-1">0</h3>
        </div>
        <div class="p-3 bg-amber-50 text-amber-600 rounded-lg">⚠️</div>
      </div>
      <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
        <div>
          <p class="text-gray-500 text-sm font-medium">Proses Berjalan / Selesai</p>
          <h3 id="statProses" class="text-3xl font-bold text-green-600 mt-1">0</h3>
        </div>
        <div class="p-3 bg-green-50 text-green-600 rounded-lg">✅</div>
      </div>
    </div>

    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-wrap gap-3 items-center justify-between">
      <div class="flex items-center gap-2 w-full md:w-auto">
        <input type="text" id="searchBar" placeholder="Cari nama cabang atau kota..." class="w-full md:w-80 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
      </div>
      <div class="flex gap-2 overflow-x-auto w-full md:w-auto">
        <button onclick="filterData('ALL')" class="filter-btn px-4 py-2 text-sm font-medium bg-blue-600 text-white rounded-lg shadow-sm">Semua</button>
        <button onclick="filterData('TAHAP 00')" class="filter-btn px-4 py-2 text-sm font-medium bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200">Belum Ajuan (00)</button>
        <button onclick="filterData('PROSES')" class="filter-btn px-4 py-2 text-sm font-medium bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200">Sedang Berjalan</button>
      </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-100 text-gray-600 text-sm font-semibold">
              <th class="p-4">ID Ajuan</th>
              <th class="p-4">Cabang</th>
              <th class="p-4">Kota</th>
              <th class="p-4">Akhir Sewa</th>
              <th class="p-4">Deadline (EWS)</th>
              <th class="p-4">Status Progress</th>
              <th class="p-4 text-center">Aksi</th>
            </tr>
          </thead>
          <tbody id="tableBody" class="divide-y divide-gray-100 text-sm text-gray-700">
            <tr>
              <td colspan="7" class="p-8 text-center text-gray-400">Memuat database...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="updateModal" class="fixed inset-0 bg-black/40 backdrop-blur-xs opacity-0 pointer-events-none transition-opacity duration-300 z-50 flex justify-end">
    <div class="bg-white w-full max-w-lg h-full p-6 shadow-xl overflow-y-auto transform translate-x-full transition-transform duration-300 flex flex-col justify-between" id="modalPanel">
      <div>
        <div class="flex justify-between items-center border-b pb-4 mb-4">
          <h2 class="text-lg font-bold text-gray-800" id="modalTitle">Update Progres</h2>
          <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl font-semibold cursor-pointer">&times;</button>
        </div>

        <form id="updateForm" class="space-y-4">
          <input type="hidden" id="modalIdAjuan">
          
          <div>
            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Tahap Progress Saat Ini</label>
            <select id="modalStatusSelect" class="w-full border p-2.5 rounded-lg text-sm bg-gray-50 focus:ring-2 focus:ring-blue-500" onchange="toggleFileUpload(this.value)">
              <option value="TAHAP 00 - BELUM PENGAJUAN">TAHAP 00 - BELUM PENGAJUAN</option>
              <option value="TAHAP 01 - BELUM LENGKAP">TAHAP 01 - BELUM LENGKAP</option>
              <option value="TAHAP 02 - PENGAJUAN LENGKAP">TAHAP 02 - PENGAJUAN LENGKAP</option>
              <option value="TAHAP 03 - PPT PEMBAHASAN">TAHAP 03 - PPT PEMBAHASAN</option>
              <option value="TAHAP 06 - NEGOSIASI HARGA">TAHAP 06 - NEGOSIASI HARGA</option>
              <option value="TAHAP 07 - SURAT ACC, HITUNGAN PAJAK, SURAT KUASA">TAHAP 07 - SURAT ACC...</option>
              <option value="TAHAP 08 - PEMBUATAN DRAFT AKTA SEWA">TAHAP 08 - PEMBUATAN DRAFT AKTA SEWA</option>
              <option value="TAHAP 09 - TTD DI NOTARIS">TAHAP 09 - TTD DI NOTARIS</option>
              <option value="TAHAP 10 - SUDAH TTD BELUM PEMBAYARAN">TAHAP 10 - SUDAH TTD BELUM PEMBAYARAN</option>
              <option value="TAHAP 11A - TUNTAS, FILE SALINAN AKTA SEWA SUDAH DI TERIMA">TAHAP 11A - TUNTAS</option>
            </select>
          </div>

          <div>
            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">📅 Tanggal Progres Terjadi (Wajib)</label>
            <input type="date" id="modalTglProgres" class="w-full border p-2.5 rounded-lg text-sm bg-gray-50 focus:ring-2 focus:ring-blue-500">
          </div>

          <div id="fileUploadGroup" class="hidden p-4 bg-blue-50 border border-blue-100 rounded-lg space-y-2">
            <label class="block text-xs font-bold text-blue-700 uppercase">📁 Dokumen Draft Akta</label>
            <input type="file" id="modalFile" accept=".pdf,image/*" class="text-xs text-gray-600 block w-full cursor-pointer file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-blue-600 file:text-white file:hover:bg-blue-700">
          </div>

          <div class="border-t pt-4">
            <h4 class="text-sm font-bold text-gray-700 mb-2">📝 Catatan Pembahasan (Opsional)</h4>
            <div class="space-y-3">
              <div><label class="text-xs text-gray-500 block mb-0.5">Hasil diskusi dengan MM</label><textarea id="noteMM" rows="2" class="w-full border rounded-md p-2 text-xs focus:ring-1 focus:ring-blue-500"></textarea></div>
              <div><label class="text-xs text-gray-500 block mb-0.5">Hasil diskusi dengan Staf Ahli Gedung</label><textarea id="noteAhli" rows="2" class="w-full border rounded-md p-2 text-xs focus:ring-1 focus:ring-blue-500"></textarea></div>
              <div><label class="text-xs text-gray-500 block mb-0.5">Usulan Negosiator</label><textarea id="noteNegosiator" rows="2" class="w-full border rounded-md p-2 text-xs focus:ring-1 focus:ring-blue-500"></textarea></div>
              <div><label class="text-xs text-gray-500 block mb-0.5">Usulan Negosiasi</label><textarea id="noteNegosiasi" rows="2" class="w-full border rounded-md p-2 text-xs focus:ring-1 focus:ring-blue-500"></textarea></div>
              <div><label class="text-xs text-gray-500 block mb-0.5">Catatan Khusus</label><textarea id="noteKhusus" rows="2" class="w-full border rounded-md p-2 text-xs focus:ring-1 focus:ring-blue-500"></textarea></div>
            </div>
          </div>
        </form>
      </div>

      <div class="border-t pt-4 mt-6 flex gap-2">
        <button onclick="submitUpdate()" id="btnSimpan" type="button" class="w-full bg-blue-600 text-white text-sm font-medium py-2.5 rounded-lg hover:bg-blue-700 shadow-sm cursor-pointer transition">Simpan Perubahan</button>
        <button onclick="closeModal()" class="w-32 bg-gray-100 text-gray-600 text-sm font-medium py-2.5 rounded-lg hover:bg-gray-200 cursor-pointer transition">Batal</button>
      </div>
    </div>
  </div>

  <script>
    // 🔴 MASUKKAN URL /exec APPS SCRIPT KAMU DI SINI
    const API_URL = "https://script.google.com/macros/s/AKfycbymVBXxGbUWgWR0fkvQvO3HYz26dw-DYe2Xl1MWO6DBe3KISDSeDMtukLssxxlVmBHVHQ/exec"; 

    let masterData = [];
    let currentFilter = 'ALL';

    window.addEventListener('DOMContentLoaded', fetchDatabase);

    async function fetchDatabase() {
      const tbody = document.getElementById('tableBody');
      try {
        const res = await fetch(API_URL);
        masterData = await res.json();
        if(masterData.status === "error") {
          tbody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-red-500 font-bold">${masterData.message}</td></tr>`;
          return;
        }
        calculateStats();
        renderTable();
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-red-500 font-bold">Gagal terhubung ke database.</td></tr>`;
      }
    }

    function calculateStats() {
      document.getElementById('statTotal').innerText = masterData.length;
      const belum = masterData.filter(d => d.TAHAP && d.TAHAP.includes("TAHAP 00")).length;
      document.getElementById('statBelum').innerText = belum;
      document.getElementById('statProses').innerText = masterData.length - belum;
    }

    // Fungsi menghitung H- minus deadline hari
    function hitungDeadline(tglSewaStr) {
      if (!tglSewaStr || tglSewaStr === '-') return { teks: '-', kelas: 'text-gray-400' };
      
      const tglSewa = new Date(tglSewaStr);
      const hariIni = new Date();
      
      // Reset jam ke 00:00:00 agar hitungan murni hari
      tglSewa.setHours(0,0,0,0);
      hariIni.setHours(0,0,0,0);
      
      const selisihWaktu = tglSewa.getTime() - hariIni.getTime();
      const selisihHari = Math.ceil(selisihWaktu / (1000 * 60 * 60 * 24));
      
      if (selisihHari < 0) {
        return { teks: `⚠️ Lewat ${Math.abs(selisihHari)} Hari`, kelas: 'text-red-600 font-bold bg-red-50 px-2 py-1 rounded' };
      } else if (selisihHari <= 90) {
        return { teks: `🚨 H-${selisihHari} Hari`, kelas: 'text-amber-600 font-bold bg-amber-50 px-2 py-1 rounded' };
      } else {
        return { teks: `H-${selisihHari} Hari`, kelas: 'text-green-600 font-medium' };
      }
    }

    function renderTable() {
      const tbody = document.getElementById('tableBody');
      const searchTxt = document.getElementById('searchBar').value.toLowerCase();
      tbody.innerHTML = '';

      let filtered = masterData.filter(item => {
        const matchesSearch = (item.CABANG2 && item.CABANG2.toLowerCase().includes(searchTxt)) || 
                              (item.Kota && item.Kota.toLowerCase().includes(searchTxt));
        if (currentFilter === 'TAHAP 00') return matchesSearch && item.TAHAP && item.TAHAP.includes("TAHAP 00");
        if (currentFilter === 'PROSES') return matchesSearch && item.TAHAP && !item.TAHAP.includes("TAHAP 00");
        return matchesSearch;
      });

      if(filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-gray-400">Tidak ditemukan data.</td></tr>`;
        return;
      }

      filtered.forEach(item => {
        const isBelum = item.TAHAP && item.TAHAP.includes("TAHAP 00");
        const statusBadge = isBelum 
          ? `<span class="bg-amber-100 text-amber-800 text-xs px-2.5 py-1 rounded-md font-semibold">${item.TAHAP}</span>`
          : `<span class="bg-blue-100 text-blue-800 text-xs px-2.5 py-1 rounded-md font-semibold">${item.TAHAP || 'Kosong'}</span>`;

        // Mengambil kolom MASA AKHIR SEWA yang sudah dinormalisasi kodenya dari \n
        const tglSewaRaw = item["MASA AKHIR SEWA"] || '-';
        const ews = hitungDeadline(tglSewaRaw);

        tbody.innerHTML += `
          <tr class="hover:bg-gray-50/70 transition border-b border-gray-100">
            <td class="p-4 font-mono text-xs text-gray-500">${item["ID Ajuan"] || '-'}</td>
            <td class="p-4 font-bold text-gray-900">${item.CABANG2 || '-'}</td>
            <td class="p-4 text-gray-600">${item.Kota || '-'}</td>
            <td class="p-4 font-medium text-gray-700">${tglSewaRaw}</td>
            <td class="p-4 text-xs ${ews.kelas}">${ews.teks}</td>
            <td class="p-4">${statusBadge}</td>
            <td class="p-4 text-center">
              <button onclick="openModal('${item["ID Ajuan"]}')" class="bg-white border border-gray-200 text-gray-700 hover:bg-gray-50 px-3 py-1.5 rounded-md text-xs font-medium cursor-pointer">Update</button>
            </td>
          </tr>
        `;
      });
    }

    document.getElementById('searchBar').addEventListener('input', renderTable);

    function filterData(type) {
      currentFilter = type;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('bg-blue-600', 'text-white');
        btn.classList.add('bg-gray-100', 'text-gray-600');
      });
      event.target.classList.add('bg-blue-600', 'text-white');
      renderTable();
    }

    function toggleFileUpload(val) {
      const group = document.getElementById('fileUploadGroup');
      if (val.includes("TAHAP 08") || val.includes("TAHAP 09") || val.includes("TAHAP 10")) {
        group.classList.remove('hidden');
      } else {
        group.classList.add('hidden');
      }
    }

    function openModal(idAjuan) {
      const item = masterData.find(d => d["ID Ajuan"] == idAjuan);
      if(!item) return;

      document.getElementById('modalIdAjuan').value = idAjuan;
      document.getElementById('modalTitle').innerText = `Update: ${item.CABANG2}`;
      document.getElementById('modalStatusSelect').value = item.TAHAP || "TAHAP 00 - BELUM PENGAJUAN";
      
      // Set default tanggal hari ini pada input form tanggal progres
      const hariIni = new Date().toISOString().split('T')[0];
      document.getElementById('modalTglProgres').value = item.Tanggal_Update_Progres || hariIni;

      document.getElementById('noteMM').value = item.Catatan_MM || "";
      document.getElementById('noteAhli').value = item.Catatan_Staf_Ahli || "";
      document.getElementById('noteNegosiator').value = item.Usulan_Negosiator || "";
      document.getElementById('noteNegosiasi').value = item.Usulan_Negosiasi || "";
      document.getElementById('noteKhusus').value = item.Catatan_Khusus || "";

      toggleFileUpload(document.getElementById('modalStatusSelect').value);

      document.getElementById('updateModal').classList.remove('opacity-0', 'pointer-events-none');
      document.getElementById('modalPanel').classList.remove('translate-x-full');
      document.body.classList.add('modal-active');
    }

    function closeModal() {
      document.getElementById('updateModal').classList.add('opacity-0', 'pointer-events-none');
      document.getElementById('modalPanel').classList.add('translate-x-full');
      document.body.classList.remove('modal-active');
      document.getElementById('updateForm').reset();
    }

    async function submitUpdate() {
      const idAjuan = document.getElementById('modalIdAjuan').value;
      const status = document.getElementById('modalStatusSelect').value;
      const tglProgres = document.getElementById('modalTglProgres').value;
      const fileInput = document.getElementById('modalFile');
      const btn = document.getElementById('btnSimpan');

      if (!tglProgres) {
        alert("⚠️ Silakan isi Tanggal Progres terlebih dahulu!");
        return;
      }

      btn.innerText = "Memproses...";
      btn.disabled = true;

      const payload = {
        action: "update_status",
        idAjuan: idAjuan,
        status: status,
        tglProgres: tglProgres,
        catatanMM: document.getElementById('noteMM').value,
        catatanAhli: document.getElementById('noteAhli').value,
        usulanNegosiator: document.getElementById('noteNegosiator').value,
        usulanNegosiasi: document.getElementById('noteNegosiasi').value,
        catatanKhusus: document.getElementById('noteKhusus').value
      };

      if (fileInput.files.length > 0) {
        const file = fileInput.files[0];
        const reader = new FileReader();
        reader.onload = async function() {
          payload.fileBase64 = reader.result;
          payload.fileName = file.name;
          payload.fileMimeType = file.type;
          executePost(payload);
        };
        reader.readAsDataURL(file);
      } else {
        executePost(payload);
      }
    }

    async function executePost(payload) {
      const btn = document.getElementById('btnSimpan');
      try {
        const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        const resData = await response.json();
        if(resData.status === "success") {
          alert("🎉 Data Berhasil Diperbarui!");
          closeModal();
          fetchDatabase();
        } else {
          alert("🚨 Gagal: " + resData.message);
        }
      } catch (err) {
        alert("🚨 Terjadi kesalahan jaringan.");
      } finally {
        btn.innerText = "Simpan Perubahan";
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
