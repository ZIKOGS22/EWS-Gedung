<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EWS Kontroling Cabang 2027</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    .modal { transition: opacity 0.25s ease; }
    body.modal-active { overflow: hidden; }
  </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

  <nav class="bg-blue-900 text-white p-4 shadow-md flex justify-between items-center">
    <h1 class="text-xl font-bold tracking-wider">🏢 EWS DASHBOARD GEDUNG 2027</h1>
    <span class="text-sm bg-blue-800 px-3 py-1 rounded">Live Sync: Google Sheets</span>
  </nav>

  <div class="max-w-7xl mx-auto p-4 md:p-6 space-y-6">
    
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
        <div>
          <p class="text-gray-500 text-sm font-medium">Total Ajuan Cabang</p>
          <h3 id="statTotal" class="text-3xl font-bold mt-1">0</h3>
        </div>
        <div class="p-3 bg-blue-50 text-blue-600 rounded-lg">📊</div>
      </div>
      <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
        <div>
          <p class="text-gray-500 text-sm font-medium">Belum Pengajuan (Tahap 00)</p>
          <h3 id="statBelum" class="text-3xl font-bold text-amber-600 mt-1">0</h3>
        </div>
        <div class="p-3 bg-amber-50 text-amber-600 rounded-lg">⚠️</div>
      </div>
      <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
        <div>
          <p class="text-gray-500 text-sm font-medium">Proses Berjalan / Selesai</p>
          <h3 id="statProses" class="text-3xl font-bold text-green-600 mt-1">0</h3>
        </div>
        <div class="p-3 bg-green-50 text-green-600 rounded-lg">✅</div>
      </div>
    </div>

    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-wrap gap-3 items-center justify-between">
      <div class="flex items-center gap-2 w-full md:w-auto">
        <input type="text" id="searchBar" placeholder="Cari nama cabang atau kota..." class="w-full md:w-80 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
      </div>
      <div class="flex gap-2 overflow-x-auto w-full md:w-auto">
        <button onclick="filterData('ALL')" class="filter-btn px-4 py-2 text-sm font-medium bg-blue-600 text-white rounded-lg shadow-sm">Semua</button>
        <button onclick="filterData('TAHAP 00')" class="filter-btn px-4 py-2 text-sm font-medium bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200">Belum Ajuan (00)</button>
        <button onclick="filterData('PROSES')" class="filter-btn px-4 py-2 text-sm font-medium bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200">Sedang Berjalan</button>
      </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-100 text-gray-600 text-sm font-semibold">
              <th class="p-4">ID Ajuan</th>
              <th class="p-4">Cabang</th>
              <th class="p-4">Kota</th>
              <th class="p-4">Masa Akhir Sewa</th>
              <th class="p-4">Status Progress</th>
              <th class="p-4">Draft Akta</th>
              <th class="p-4 text-center">Aksi</th>
            </tr>
          </thead>
          <tbody id="tableBody" class="divide-y divide-gray-100 text-sm text-gray-700">
            <tr>
              <td colspan="7" class="p-8 text-center text-gray-400">Memuat database dari Google Sheets...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="updateModal" class="fixed inset-0 bg-black/40 backdrop-blur-xs opacity-0 pointer-events-none transition-opacity duration-300 z-50 flex justify-end">
    <div class="bg-white w-full max-w-lg h-full p-6 shadow-xl overflow-y-auto transform translate-x-full transition-transform duration-300 flex flex-col justify-between" id="modalPanel">
      <div>
        <div class="flex justify-between items-center border-b pb-4 mb-4">
          <h2 class="text-lg font-bold text-gray-800" id="modalTitle">Update Progres Cabang</h2>
          <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl font-semibold cursor-pointer">&times;</button>
        </div>

        <form id="updateForm" class="space-y-4">
          <input type="hidden" id="modalIdAjuan">
          
          <div>
            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Tahap Progress Saat Ini</label>
            <select id="modalStatusSelect" class="w-full border p-2.5 rounded-lg text-sm bg-gray-50 focus:ring-2 focus:ring-blue-500" onchange="toggleFileUpload(this.value)">
              <option value="TAHAP 00 - BELUM PENGAJUAN">TAHAP 00 - BELUM PENGAJUAN</option>
              <option value="TAHAP 01 - BELUM LENGKAP">TAHAP 01 - BELUM LENGKAP</option>
              <option value="TAHAP 02 - PENGAJUAN LENGKAP">TAHAP 02 - PENGAJUAN LENGKAP</option>
              <option value="TAHAP 03 - PPT PEMBAHASAN">TAHAP 03 - PPT PEMBAHASAN</option>
              <option value="TAHAP 06 - NEGOSIASI HARGA">TAHAP 06 - NEGOSIASI HARGA</option>
              <option value="TAHAP 07 - SURAT ACC, HITUNGAN PAJAK, SURAT KUASA">TAHAP 07 - SURAT ACC...</option>
              <option value="TAHAP 08 - PEMBUATAN DRAFT AKTA SEWA">TAHAP 08 - PEMBUATAN DRAFT AKTA SEWA</option>
              <option value="TAHAP 09 - TTD DI NOTARIS">TAHAP 09 - TTD DI NOTARIS</option>
              <option value="TAHAP 10 - SUDAH TTD BELUM PEMBAYARAN">TAHAP 10 - SUDAH TTD BELUM PEMBAYARAN</option>
              <option value="TAHAP 11A - TUNTAS, FILE SALINAN AKTA SEWA SUDAH DI TERIMA">TAHAP 11A - TUNTAS</option>
            </select>
          </div>

          <div id="fileUploadGroup" class="hidden p-4 bg-blue-50 border border-blue-100 rounded-lg space-y-2">
            <label class="block text-xs font-bold text-blue-700 uppercase tracking-wider">📁 Dokumen
